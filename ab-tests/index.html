<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Plan — AB-тесты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const theme = localStorage.getItem("ab-theme") === "dark" ? "dark" : "light";
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.colorScheme = theme;
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <script>
      (() => {
        const RAW_ENTRY = "/src/main.tsx";
        const FALLBACK_CSS = "/assets/app.css?v=20260507-runtime-fallback-v4";
        const FALLBACK_JS = "/assets/app.js?v=20260507-runtime-fallback-v4";

        function ensureFallbackAssets() {
          const entry = document.querySelector('script[data-app-entry="source"]');
          if (!(entry instanceof HTMLScriptElement)) return;
          if ((entry.getAttribute("src") || "").trim() !== RAW_ENTRY) return;
          if (document.querySelector('link[data-app-fallback="css"]')) return;

          const css = document.createElement("link");
          css.rel = "stylesheet";
          css.href = FALLBACK_CSS;
          css.dataset.appFallback = "css";
          document.head.appendChild(css);

          const js = document.createElement("script");
          js.type = "module";
          js.src = FALLBACK_JS;
          js.dataset.appFallback = "js";
          document.body.appendChild(js);
        }

        window.addEventListener("DOMContentLoaded", ensureFallbackAssets, { once: true });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" data-app-entry="source"></script>
  </body>
</html>
