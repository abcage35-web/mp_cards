  </defs>

  <rect x="0" y="0" width="1600" height="520" fill="url(#bg)"/>

  <rect x="28" y="24" width="1544" height="472" rx="20" fill="#FFFFFF" stroke="#D9E5EA" filter="url(#shadow)"/>

  <text x="64" y="78" font-family="'IBM Plex Sans', Arial" font-size="20" font-weight="700" fill="#173241">Панель проблем карточек</text>
