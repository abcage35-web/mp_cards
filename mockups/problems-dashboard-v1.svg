<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFC"/>
      <stop offset="1" stop-color="#EEF4F6"/>
    </linearGradient>
    <linearGradient id="total" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8D2B1F"/>
      <stop offset="1" stop-color="#C1452D"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F58C72"/>
      <stop offset="1" stop-color="#CF4A32"/>
