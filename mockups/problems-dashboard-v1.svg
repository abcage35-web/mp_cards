    <linearGradient id="barOrange" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F6B974"/>
      <stop offset="1" stop-color="#D17A19"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.12"/>
