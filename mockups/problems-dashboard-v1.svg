  <rect x="64" y="132" width="360" height="132" rx="16" fill="url(#total)"/>
  <text x="92" y="176" font-family="'IBM Plex Sans', Arial" font-size="16" font-weight="600" fill="#FCE8E4">Всего проблем</text>
  <text x="92" y="232" font-family="'Space Grotesk', Arial" font-size="58" font-weight="700" fill="#FFFFFF">181</text>
  <text x="238" y="232" font-family="'IBM Plex Sans', Arial" font-size="18" font-weight="600" fill="#FCE8E4">из 396 строк</text>

  <rect x="450" y="132" width="1058" height="132" rx="16" fill="#F7FAFB" stroke="#DCE7EC"/>
  <text x="476" y="165" font-family="'IBM Plex Sans', Arial" font-size="14" font-weight="600" fill="#264454">Структура проблем</text>
  <rect x="476" y="184" width="992" height="26" rx="13" fill="#E9EFF2"/>
  <rect x="476" y="184" width="992" height="26" rx="13" fill="url(#barRed)"/>
  <text x="476" y="245" font-family="'IBM Plex Sans', Arial" font-size="13" fill="#5B6E78">Рич — 181 (100%) • Рек — 0 • Видео — 0 • Автоплей — 0 • Тэги — 0</text>

